  - id: "q1_poisoning_attacks_detailed"

    paper_name: "Adversarial Data Poisoning Attacks on Quantum Machine Learning in the NISQ Era (2024)"

    user_input: |
      ABSTRACT: With the growing interest in Quantum Machine Learning (QML) and the increasing availability of quantum computers through cloud providers, addressing the potential security risks associated with QML has become an urgent priority. One key concern in the QML domain is the threat of data poisoning attacks in the current quantum cloud setting... Classical data poisoning techniques require significant knowledge and training to generate poisoned data, and lack noise resilience, making them ineffective for QML models in the Noisy Intermediate Scale Quantum (NISQ) era. In this work, we first propose a simple yet effective technique to measure intra-class encoder state similarity (ESS)... we introduce a Quantum Indiscriminate Data Poisoning attack, QUID. Through extensive experiments conducted in both noiseless and noisy environments... QUID achieves up to 92% accuracy degradation...
      INTRODUCTION: Quantum computing is rapidly progressing... we propose a quantum indiscriminate data poisoning attack, QUID, using a novel label-flipping strategy.

    concepts: ["QUID", "encoder state similarity", "label-flipping", "accuracy degradation", "noise resilience"]

    reference: |
      Paper: [Adversarial Data Poisoning Attacks on Quantum Machine Learning in the NISQ Era, Satwik Kundu and Swaroop Ghosh, 2024]
      Problem: [Current quantum machine learning models deployed in cloud settings face critical security risks from data poisoning attacks. Classical data poisoning techniques are ineffective for QML in the NISQ era because they lack resilience to quantum hardware noise and require extensive knowledge of the training procedure.]
      Approach: [The authors introduce a novel Quantum Indiscriminate Data Poisoning (QUID) attack that relies on intra-class encoder state similarity (ESS). This technique determines optimal poisoned labels without needing knowledge of the victim model. The algorithm assigns incorrect labels to maximize deviation of encoded states.]
      Result: [QUID achieved up to 92% accuracy degradation across architectures in both noiseless and noisy environments, bypassing classical defenses and maintaining over 50% degradation.]
      Implication: [Reveals critical vulnerabilities in cloud-based QML and highlights the urgent need for quantum-specific defenses.]
      Open questions: [How can robust data sanitization or defense techniques mitigate indiscriminate poisoning attacks on near-term quantum devices?]


